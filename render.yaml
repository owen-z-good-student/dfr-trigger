services:
  - type: web
    name: dfr-trigger
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DFR_CONFIG_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: PUBLIC_ORIGIN
        sync: false
      - key: TRUSTED_IDENTITY_HEADER
        sync: false
      - key: TRUSTED_PROXY_CIDRS
        sync: false
      - key: LIVE_DISPATCH_ENABLED
        value: "false"
      - key: FH2_CONTRACT_VERIFIED
        value: "false"