app_name: dfr-trigger
type: backend

dependencies:
  - python@3.12
  - uv

backend:
  path: .
  build: uv sync --frozen --no-dev
  start: PORT=8081 uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8081 --no-proxy-headers
  port: 8081
  health_check: http://127.0.0.1:8081/api/health
  health_timeout: 60
