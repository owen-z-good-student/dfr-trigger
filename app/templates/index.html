<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFR Trigger</title>

  <!-- Leaflet 1.9.4 -->
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css" />
  <script src="/static/vendor/leaflet/leaflet.js"></script>

  <!-- Lucide 0.544.0 -->
  <script src="/static/vendor/lucide/lucide.js"></script>

  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body data-nav-expanded="false">

  {% if mode == "mock" %}
  <div id="mock-badge" aria-label="Mock mode active">MOCK MODE</div>
  {% endif %}

  <aside id="nav-rail" aria-label="Primary navigation">
    <button id="nav-toggle" aria-label="Expand navigation" aria-expanded="false">
      <i data-lucide="menu"></i>
    </button>
    <div id="nav-logo" aria-label="Brand logo" hidden></div>
    <button class="nav-item is-active" data-module="dispatch" aria-label="Open Dispatch panel">
      <i data-lucide="drone"></i><span>Dispatch</span>
    </button>
    <button class="nav-item" data-module="configuration" aria-label="Open Configuration panel">
      <i data-lucide="wrench"></i><span>Configuration</span>
    </button>
    <button class="nav-item" data-module="logs" aria-label="Open Log panel">
      <i data-lucide="book-open"></i><span>Log</span>
    </button>
  </aside>

  <section id="functional-panel" aria-live="polite">
    <!-- Panel content injected by JS -->
  </section>

  <main id="map" aria-label="Incident map"></main>

  <!-- Panel templates -->
  <template id="tpl-dispatch">
    <div class="panel-inner">
      <h2 class="panel-title">Dispatch</h2>
      <form id="dispatch-form" autocomplete="off" novalidate>
        <div class="field-group">
          <label for="latitude">Latitude <span class="req">*</span></label>
          <input id="latitude" name="latitude" type="number" step="any"
                 min="-90" max="90" required placeholder="Click map or enter" />
        </div>
        <div class="field-group">
          <label for="longitude">Longitude <span class="req">*</span></label>
          <input id="longitude" name="longitude" type="number" step="any"
                 min="-180" max="180" required placeholder="Click map or enter" />
        </div>
        <div class="field-group">
          <label for="location">Location</label>
          <input id="location" name="location" type="text" maxlength="300"
                 placeholder="Address or description" />
          <button type="button" id="geocode-btn" class="btn-secondary btn-small">Geocode</button>
        </div>
        <div class="field-group">
          <label for="incident-type">Incident Type</label>
          <select id="incident-type" name="incident_type">
            <option value="">— select —</option>
            <option value="Security Alarm">Security Alarm</option>
            <option value="Fire">Fire</option>
            <option value="Traffic Accident">Traffic Accident</option>
            <option value="Crime in Progress">Crime in Progress</option>
            <option value="Search &amp; Rescue">Search &amp; Rescue</option>
            <option value="Missing Person">Missing Person</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field-group" id="custom-incident-type-group" hidden>
          <label for="custom-incident-type">Custom Incident Type</label>
          <input id="custom-incident-type" name="custom_incident_type" type="text"
                 maxlength="80" placeholder="Describe incident type" />
        </div>
        <div class="field-group">
          <label for="priority">Priority <span class="req">*</span></label>
          <select id="priority" name="priority" required>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
          </select>
        </div>
        <div class="field-group">
          <label for="operator-name">Operator Name</label>
          <input id="operator-name" name="operator_name" type="text" maxlength="120" />
        </div>
        <div class="field-group">
          <label for="caller-phone">Caller Phone</label>
          <input id="caller-phone" name="caller_phone" type="tel" maxlength="40" />
        </div>
        <div class="field-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" maxlength="2000" rows="3"></textarea>
        </div>
        <div id="dispatch-status" class="status-msg" aria-live="assertive" hidden></div>
        <button type="submit" id="dispatch-btn" class="btn-primary">Dispatch</button>
      </form>
    </div>
  </template>

  <template id="tpl-configuration">
    <div class="panel-inner">
      <h2 class="panel-title">Configuration</h2>
      <form id="config-form" autocomplete="off" novalidate>
        <div class="field-group">
          <label>Token Status</label>
          <span id="token-status" class="config-status">Not configured</span>
        </div>
        <div class="field-group">
          <label for="user-token">User Token</label>
          <input id="user-token" name="user_token" type="password"
                 maxlength="4096" placeholder="Paste new token to replace" autocomplete="new-password" />
        </div>
        <div class="field-group">
          <label for="config-region">Region</label>
          <select id="config-region" name="region">
            <option value="global">Global</option>
            <option value="eu" selected>Europe</option>
          </select>
        </div>
        <div class="field-group">
          <label for="project-uuid">Project UUID</label>
          <input id="project-uuid" name="project_uuid" type="text"
                 minlength="6" maxlength="128" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </div>
        <div class="field-group">
          <label for="workflow-uuid">Workflow UUID</label>
          <input id="workflow-uuid" name="workflow_uuid" type="text"
                 minlength="6" maxlength="128" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </div>
        <div class="field-group">
          <label>Default Map Center</label>
          <div class="config-center-row">
            <span id="default-center-display">Not set</span>
            <button type="button" id="set-default-center-btn" class="btn-secondary" disabled>Set</button>
          </div>
        </div>
        <div class="field-group">
          <label>Brand Logo</label>
          <div class="logo-upload-row">
            <input type="file" id="logo-upload" accept="image/png" hidden />
            <span id="logo-status">No logo</span>
            <button type="button" id="logo-upload-btn" class="btn-secondary">Upload</button>
            <button type="button" id="logo-remove-btn" class="btn-secondary" hidden>Remove</button>
          </div>
        </div>
        <div id="config-status-msg" class="status-msg" aria-live="assertive" hidden></div>
        <div class="btn-row">
          <button type="submit" class="btn-primary">Save</button>
          <button type="button" id="test-config-btn" class="btn-secondary">Test</button>
        </div>
      </form>
    </div>
  </template>

  <template id="tpl-logs">
    <div class="panel-inner">
      <h2 class="panel-title">Log</h2>
      <div class="log-filters">
        <input id="log-search" type="search" placeholder="Search…" />
        <select id="log-priority-filter">
          <option value="">All priorities</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <select id="log-outcome-filter">
          <option value="">All outcomes</option>
          <option value="success">Success</option>
          <option value="failure">Failure</option>
          <option value="indeterminate">Indeterminate</option>
        </select>
        <button type="button" id="log-refresh-btn" class="btn-secondary btn-small">Refresh</button>
      </div>
      <div id="log-list" class="log-list" aria-live="polite"></div>
    </div>
  </template>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/navigation.js"></script>
  <script src="/static/js/map.js"></script>
  <script src="/static/js/dispatch.js"></script>
  <script src="/static/js/configuration.js"></script>
  <script src="/static/js/logs.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
